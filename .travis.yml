language: node_js
node_js: '10'
branches:
  only: master
before_install:
  composer config --global github-oauth.github.com "$GITHUB_TOKEN"  
install: npm install
script: npm run build
deploy:
  provider: pages
  skip_cleanup: true
  github_token: "$GITHUB_TOKEN"
  keep_history: true
  local_dir: "./dist"
  on:
    branch: master
env:
  global:
  - secure: 
