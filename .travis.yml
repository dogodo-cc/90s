language: node_js
node_js: '10'
branches:
  only: master
cache:
  directories: node_modules
before_install: npm install lerna -g
install: lerna bootstrap
script: npm run build:web
after_success:
  npm run release:web
deploy:
  provider: pages
  skip_cleanup: true
  github_token: $GITHUB_TOKEN
  keep_history: true
  target_branch: gh-pages
  local_dir: "./packages/web/dist"
  on:
    branch: master
notifications:
  email:
    recipients: 741484865@qq.com
    on_success: always
    on_failure: always