language: node_js
node_js: '10'
branches:
  only: ci_task_runner
cache:
  directories: node_modules
install: yarn
script: npm run deploy
after_success:
  npm run release:web
deploy:
  provider: pages
  skip_cleanup: true
  github_token: $GITHUB_TOKEN
  keep_history: true
  target_branch: gh-pages
  local_dir: "./packages/web/dist"
  on:
    branch: ci_task_runner
notifications:
  email:
    recipients: 741484865@qq.com
    on_success: always
    on_failure: always