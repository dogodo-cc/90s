language: node_js
node_js: '10'
branches:
  only: master
before_install: 
cache:
  directories: node_modules
install: npm install
script: npm run build
deploy:
  provider: pages
  skip_cleanup: true
  github_token: "$aaa"
  keep_history: true
  local_dir: "./dist"
  on:
    branch: master
env:
  global:
    secure: 
