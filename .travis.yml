language: node_js
node_js: '10'
branches:
  only: master
cache:
  directories: node_modules
install: npm install
script: npm run build
deploy:
  provider: pages
  skip_cleanup: true
  github_token: $GITHUB_PAGES
  keep_history: true
  target_branch: gh-pages
  local_dir: "./dist"
  on:
    branch: master
