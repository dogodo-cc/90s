language: node_js
node_js: '10'
branches:
  only: lerna
cache:
  directories: node_modules
install: cd ./packages/90s && npm install
script: npm run build
after_success:
  cp ./CNAME ./dist
  cp ./public/favicon.ico ./dist
  cp -R ./website/* ./dist
deploy:
  provider: pages
  skip_cleanup: true
  github_token: $GITHUB_TOKEN
  keep_history: true
  target_branch: gh-pages
  local_dir: "./dist"
  on:
    branch: master
notifications:
  email:
    recipients: 741484865@qq.com
    on_success: always
    on_failure: always