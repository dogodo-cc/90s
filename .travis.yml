language: node_js
node_js:
  "10"

# safelist  
branches:
  only:
    master

install:
  npm install

script: 
  npm run build  

# 部署到 github pages
deploy:
  provider: pages
  skip_cleanup: true
  github_token: 34bc71263851cf290a509804df1091cb354323a4
  keep_history: true
  local_dir: './dist'
  on:
    branch: master